name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies (CPU only)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch so model tests can run on the runner
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pandas scikit-learn scipy matplotlib pytest ruff

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests
        run: pytest -q